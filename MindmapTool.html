<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindmap Tool - 思维导图工具</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            text-align: center;
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        
        .container {
            flex: 1;
            display: flex;
            gap: 16px;
            padding: 16px;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }
        
        .panel {
            flex: 1;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            padding: 12px 20px;
            color: white;
            font-weight: 500;
            font-size: 14px;
        }
        
        .panel-body {
            flex: 1;
            padding: 16px;
            overflow: auto;
            min-height: 500px;
        }
        
        textarea {
            width: 100%;
            height: 100%;
            min-height: 400px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            background: #f8fafc;
            color: #1e293b;
        }
        
        textarea:focus {
            border-color: #6366f1;
            background: white;
        }
        
        #preview {
            width: 100%;
            height: 100%;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            padding: 20px;
        }
        
        #preview svg {
            max-width: 100%;
            max-height: 100%;
        }
        
        .empty-state {
            text-align: center;
            color: #94a3b8;
        }
        
        .tip {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 12px 16px;
            margin-top: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 12px;
            color: #92400e;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        🗺️ Mindmap Tool - 思维导图工具
    </header>
    
    <div class="container">
        <div class="panel">
            <div class="panel-header">文本输入</div>
            <div class="panel-body">
                <textarea id="inputText" placeholder="请输入层级结构文本：

主主题
  - 子主题1
    - 孙主题1.1
    - 孙主题1.2
  - 子主题2"></textarea>
                <div class="tip">💡 使用 Tab 键或短横线 (-) 加空格进行缩进</div>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">思维导图预览</div>
            <div class="panel-body">
                <div id="preview">
                    <div class="empty-state">
                        <p>请在左侧输入文本</p>
                        <p style="margin-top: 8px;">思维导图将在这里实时渲染</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'default'
        });

        const inputText = document.getElementById('inputText');
        const preview = document.getElementById('preview');

        function textToMindmap(text) {
            if (!text.trim()) {
                return '';
            }
            
            const lines = text.trim().split('\n');
            let mermaidCode = 'mindmap\n';
            
            lines.forEach(line => {
                let trimmed = line.trim();
                if (!trimmed) return;
                
                let depth = 0;
                let content = trimmed;
                
                if (trimmed.startsWith('- ')) {
                    content = trimmed.substring(2);
                    const leadingSpaces = line.length - line.trimStart().length;
                    depth = Math.floor(leadingSpaces / 2) + 1;
                } else {
                    const leadingTabs = (line.match(/^\t*/) || [''])[0].length;
                    if (leadingTabs > 0) {
                        depth = leadingTabs;
                        content = line.substring(leadingTabs);
                    }
                }
                
                const prefix = '  '.repeat(depth);
                const link = depth > 0 ? '-- ' : '';
                mermaidCode += `${prefix}${link}${content}\n`;
            });
            
            return mermaidCode;
        }

        async function renderMindmap() {
            const text = inputText.value;
            const mermaidCode = textToMindmap(text);
            
            if (!mermaidCode) {
                preview.innerHTML = `
                    <div class="empty-state">
                        <p>请在左侧输入文本</p>
                        <p style="margin-top: 8px;">思维导图将在这里实时渲染</p>
                    </div>
                `;
                return;
            }
            
            const containerId = `mm-container-${Date.now()}`;
            preview.innerHTML = `<div id="${containerId}"><pre class="mermaid">${mermaidCode}</pre></div>`;
            
            try {
                await mermaid.run({
                    querySelector: `#${containerId} .mermaid`
                });
            } catch (err) {
                console.error('Mermaid render error:', err);
                preview.innerHTML = `<div class="empty-state"><p style="color: #ef4444;">渲染错误: ${err.message}</p></div>`;
            }
        }

        inputText.value = `我的思维导图
  - 项目管理
    - 计划阶段
    - 执行阶段
    - 验收阶段
  - 技术学习
    - 前端开发
      - HTML/CSS
      - JavaScript
    - 后端开发
  - 个人生活
    - 健康
    - 阅读
    - 旅行`;

        inputText.addEventListener('input', renderMindmap);
        
        document.addEventListener('DOMContentLoaded', renderMindmap);
    </script>
</body>
</html>
